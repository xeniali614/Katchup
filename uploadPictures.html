<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="navbar-brand">
                <h1>Katchup</h1>
            </div>
            <div class="navbar-menu">
                <a href="/">
                    <!--ADD LOGO-->
                    <img src="images/splat.png" alt="Katchup Logo" class="logo">
                </a>
                <a href="dashboard.html" class="nav-link">Home</a>
                <a href="pictureGallery.html" class="nav-link btn-tertiary">Pictures</a>
                <a href="letterLog.html" class="nav-link btn-tertiary">Letter Logs</a>
                <a href="schedule.html" class="nav-link btn-tertiary">Schedule</a>
                <button class="hamburger-btn" id="hamburger">
                    <span class="bar"></span>
                    <span class="bar"></span>
                    <span class="bar"></span>
                </button>
                <!--hamburger menu links-->
                <ul class="hamburger-menu">
                    <!-- TO DO: CREATE PAGES AND LINK THEM-->
                    <li><a href="groups.html" class="nav-link">Manage Groups</a></li>
                    <li><a href="uploadPictures.html" class="nav-link">Upload Pictures</a></li>
                    <li><a href="dailyLogs.html" class="nav-link btn-tertiary">Write a Letter</a></li>
                    <li><a href="updateSchedule.html" class="nav-link btn-tertiary">Update Schedule</a></li>
                    <li><button id="logout-btn" class="nav-link btn-tertiary" style="width: 100%; text-align: left; border: none; background: none; cursor: pointer; padding: 0.75rem 1rem;">Logout</button></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Upload Pictures Section -->
    <section class="upload-section">
        <div class="container">
            <div class="section-header">
                <h2>Upload Pictures</h2>
                <p>Share your memories by uploading pictures to your gallery.</p>
            </div>

            <div id="userInfo" style="background-color: #f0f0f0; padding: 10px; border-radius: 4px; margin-bottom: 20px; font-size: 14px;">
                <p>Logged in as: <strong id="currentUserEmail">Loading...</strong></p>
            </div>
            
            <div class="upload-form-container">
                <form id="uploadForm" class="upload-form">
                    <div class="form-group">
                        <label for="groupSelect">Select Group</label>
                        <select id="groupSelect" required>
                            <option value="">Loading your groups...</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="pictureInput">Select Pictures</label>
                        <input 
                            type="file" 
                            id="pictureInput" 
                            name="pictures" 
                            multiple 
                            accept="image/*"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="pictureDescription">Caption (Optional)</label>
                        <textarea 
                            id="pictureDescription" 
                            name="description" 
                            placeholder="Add a caption for your pictures"
                            rows="4"
                        ></textarea>
                    </div>

                    <button type="submit" class="btn-primary btn-submit">Upload Pictures</button>
                </form>

                <div id="uploadMessage" class="message"></div>
            </div>

            <div class="uploads-container">
                <h3>Recent Uploads</h3>
                <div id="uploadsList" class="uploads-grid">
                    <p class="empty-state">Loading uploads...</p>
                </div>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
    <script>
        const { createClient } = window.supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY);

        const uploadForm = document.getElementById('uploadForm');
        const uploadMessage = document.getElementById('uploadMessage');
        const uploadsList = document.getElementById('uploadsList');
        const groupSelect = document.getElementById('groupSelect');

        // Helper: Calculate week start date (Monday of week) - matches gallery calculation
        function getWeekStartDate(date = new Date()) {
            const d = new Date(date);
            const dayOfWeek = d.getDay();
            const diffToMonday = d.getDate() - dayOfWeek + (dayOfWeek === 0 ? -6 : 1);
            d.setDate(diffToMonday);
            d.setHours(0, 0, 0, 0);
            d.setMinutes(0, 0, 0);
            return d.toISOString().split('T')[0];
        }

        // Display current user
        async function displayCurrentUser() {
            try {
                const { data: { user }, error } = await supabaseClient.auth.getUser();
                const userEmailElement = document.getElementById('currentUserEmail');
                
                if (error || !user) {
                    userEmailElement.textContent = 'Not logged in - please log in first';
                    return;
                }
                
                console.log('Current user uploading as:', user.id, user.email);
                userEmailElement.textContent = user.email + ' (' + user.id.substring(0, 8) + '...)';
            } catch (error) {
                console.error('Error getting user:', error);
            }
        }

        // Load user's groups
        async function loadGroups() {
            try {
                const { data: { user }, error: userError } = await supabaseClient.auth.getUser();
                if (userError || !user) {
                    groupSelect.innerHTML = '<option value="">Please log in</option>';
                    return;
                }

                // Get groups user is member of
                const { data: memberData, error: memberError } = await supabaseClient
                    .from('group_members')
                    .select('group_id, groups(id, name)')
                    .eq('user_id', user.id);

                if (memberError || !memberData || memberData.length === 0) {
                    groupSelect.innerHTML = '<option value="">No groups yet. <a href="groups.html">Create or join a group</a></option>';
                    return;
                }

                let html = '<option value="">Select a group...</option>';
                for (let member of memberData) {
                    html += `<option value="${member.groups.id}">${member.groups.name}</option>`;
                }
                groupSelect.innerHTML = html;
            } catch (error) {
                console.error('Error loading groups:', error);
                groupSelect.innerHTML = '<option value="">Error loading groups</option>';
            }
        }

        // Handle form submission
        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const fileInput = document.getElementById('pictureInput');
            const caption = document.getElementById('pictureDescription').value;
            const groupId = groupSelect.value;
            const files = fileInput.files;

            if (!groupId) {
                showMessage('Please select a group', 'error');
                return;
            }

            if (files.length === 0) {
                showMessage('Please select at least one picture', 'error');
                return;
            }

            try {
                const submitBtn = uploadForm.querySelector('button[type="submit"]');
                submitBtn.disabled = true;
                submitBtn.textContent = 'Uploading...';

                const { data: { user }, error: userError } = await supabaseClient.auth.getUser();
                if (userError || !user) {
                    showMessage('Please log in to upload pictures', 'error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Upload Pictures';
                    return;
                }

                console.log('=== UPLOAD STARTED ===');
                console.log('Uploading as user:', user.id, user.email);
                console.log('===============================');

                const photoUrls = [];
                let uploadCount = 0;

                // Upload files to photos bucket
                for (let file of files) {
                    const timestamp = Date.now();
                    const fileName = `${timestamp}-${file.name}`;
                    const filePath = `${groupId}/${user.id}/${fileName}`;
                    
                    const { data, error } = await supabaseClient.storage
                        .from('photos')
                        .upload(filePath, file);

                    if (error) {
                        console.error('Upload error:', error);
                        continue;
                    }

                    const { data: publicUrl } = supabaseClient.storage
                        .from('photos')
                        .getPublicUrl(filePath);

                    photoUrls.push(publicUrl.publicUrl);
                    uploadCount++;
                }

                if (uploadCount === 0) {
                    showMessage('Failed to upload pictures', 'error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Upload Pictures';
                    return;
                }

                // Calculate week start date (Monday of current week)
                const weekStartDate = getWeekStartDate();

                // Save to weekly_logs table
                const { error: dbError } = await supabaseClient
                    .from('weekly_logs')
                    .insert([
                        {
                            user_id: user.id,
                            group_id: groupId,
                            photo_urls: photoUrls,
                            captions: caption ? [caption] : [],
                            week_start_date: weekStartDate,
                            created_at: new Date().toISOString()
                        }
                    ]);

                if (!dbError) {
                    // Check if user has now completed 3+ photos this week
                    const { data: thisWeekLogs } = await supabaseClient
                        .from('weekly_logs')
                        .select('photo_urls')
                        .eq('user_id', user.id)
                        .eq('week_start_date', weekStartDate);

                    let totalPhotos = uploadCount; // Include the photos just uploaded
                    if (thisWeekLogs && thisWeekLogs.length > 1) {
                        for (let log of thisWeekLogs.slice(0, -1)) {
                            if (log.photo_urls) totalPhotos += log.photo_urls.length;
                        }
                    }

                    console.log('Week:', weekStartDate);
                    console.log('This week logs:', thisWeekLogs);
                    console.log('Total photos this week:', totalPhotos);

                    // Create notification if user just completed 3+ photos
                    if (totalPhotos >= 3) {
                        console.log('Creating notifications for 3+ photos');
                        
                        const { data: groupMembers } = await supabaseClient
                            .from('group_members')
                            .select('user_id')
                            .eq('group_id', groupId);

                        console.log('Group members:', groupMembers);

                        if (groupMembers && groupMembers.length > 0) {
                            const recipientIds = groupMembers
                                .filter(m => m.user_id !== user.id)
                                .map(m => m.user_id);

                            console.log('Recipient IDs:', recipientIds);

                            const notificationPromises = groupMembers
                                .filter(m => m.user_id !== user.id)
                                .map(m => {
                                    console.log('Creating notification for:', m.user_id);
                                    return supabaseClient
                                        .from('notifications')
                                        .insert([
                                            {
                                                user_id: user.id,
                                                group_id: groupId,
                                                recipient_id: m.user_id,
                                                type: 'photos_uploaded',
                                                created_at: new Date().toISOString()
                                            }
                                        ]);
                                });

                            const results = await Promise.all(notificationPromises);
                            console.log('Notification creation results:', results);
                            
                            // Check for errors in results
                            for (let i = 0; i < results.length; i++) {
                                if (results[i].error) {
                                    console.error('Notification error for recipient', i, ':', results[i].error);
                                } else {
                                    console.log('Notification created successfully for recipient', i);
                                }
                            }
                        } else {
                            console.log('No group members to notify');
                        }
                    } else {
                        console.log('Not enough photos yet. Need:', 3 - totalPhotos, 'more');
                    }

                    showMessage(`Successfully uploaded ${uploadCount} picture(s)!`, 'success');
                    uploadForm.reset();
                    loadUploads();
                } else {
                    console.error('Database error:', dbError);
                    showMessage('Upload successful but failed to save metadata', 'error');
                }

                submitBtn.disabled = false;
                submitBtn.textContent = 'Upload Pictures';
            } catch (error) {
                showMessage('An error occurred: ' + error.message, 'error');
                const submitBtn = uploadForm.querySelector('button[type="submit"]');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Upload Pictures';
            }
        });

        // Load recent uploads
        async function loadUploads() {
            try {
                const { data: { user }, error: userError } = await supabaseClient.auth.getUser();
                if (userError || !user) {
                    uploadsList.innerHTML = '<p class="empty-state">Please log in to view uploads</p>';
                    return;
                }

                const { data, error } = await supabaseClient
                    .from('weekly_logs')
                    .select('*')
                    .eq('user_id', user.id)
                    .order('created_at', { ascending: false })
                    .limit(12);

                if (error || !data || data.length === 0) {
                    uploadsList.innerHTML = '<p class="empty-state">No uploads yet</p>';
                    return;
                }

                let html = '';
                for (let log of data) {
                    if (!log.photo_urls || log.photo_urls.length === 0) continue;

                    for (let photo of log.photo_urls) {
                        const uploadDate = new Date(log.created_at).toLocaleDateString('en-US', { 
                            year: 'numeric', 
                            month: 'short', 
                            day: 'numeric' 
                        });
                        const fileName = photo.split('/').pop().split('-').slice(1).join('-');

                        html += `
                            <div class="upload-item">
                                <div class="upload-item-image">
                                    <img src="${photo}" alt="${fileName}">
                                </div>
                                <div class="upload-item-info">
                                    <p class="upload-item-name">${fileName}</p>
                                    ${log.captions && log.captions[0] ? `<p class="upload-item-description">${log.captions[0]}</p>` : ''}
                                    <div class="upload-item-meta">
                                        <span class="upload-date">${uploadDate}</span>
                                    </div>
                                </div>
                            </div>
                        `;
                    }
                }
                uploadsList.innerHTML = html || '<p class="empty-state">No uploads yet</p>';
            } catch (error) {
                console.error('Error loading uploads:', error);
                uploadsList.innerHTML = '<p class="empty-state">Error loading uploads</p>';
            }
        }

        function showMessage(message, type) {
            uploadMessage.textContent = message;
            uploadMessage.className = 'message ' + type;
            uploadMessage.style.display = 'block';

            if (type === 'success') {
                setTimeout(() => {
                    uploadMessage.style.display = 'none';
                }, 3000);
            }
        }

        // Load groups and uploads on page load
        displayCurrentUser();
        loadGroups();
        loadUploads();
    </script>
</body>
</html>
