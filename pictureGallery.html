<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Picture Gallery - Katchup</title>
    <link rel="stylesheet" href="style.css">
    <script src="vendor/supabase.min.js"></script>
    <script src="config.js"></script>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="navbar-brand">
                <img src="images/splat.png" alt="Katchup Logo" class="logo">
                <h1>Katchup</h1>
            </div>
            <div class="navbar-menu">
                <a href="dashboard.html" class="nav-link">Home</a>
                <a href="pictureGallery.html" class="nav-link btn-tertiary">Pictures</a>
                <a href="letterLog.html" class="nav-link btn-tertiary">Letter Logs</a>
                <a href="schedule.html" class="nav-link btn-tertiary">Schedule</a>
                <button class="hamburger-btn" id="hamburger">
                    <span class="bar"></span>
                    <span class="bar"></span>
                    <span class="bar"></span>
                </button>
                <!--hamburger menu links-->
                <ul class="hamburger-menu">
                    <!-- TO DO: CREATE PAGES AND LINK THEM-->
                    <li><a href="groups.html" class="nav-link">Manage Groups</a></li>
                    <li><a href="uploadPictures.html" class="nav-link">Upload Pictures</a></li>
                    <li><a href="dailyLogs.html" class="nav-link btn-tertiary">Write a Letter</a></li>
                    <li><a href="updateSchedule.html" class="nav-link btn-tertiary">Update Schedule</a></li>
                    <li><a href="#" id="logout-btn" class="nav-link btn-tertiary">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Picture Gallery Section -->
    <section class="gallery-section">
        <div class="container">
            <div class="section-header">
                <h2>Picture Gallery</h2>
                <p>View all photos from your groups</p>
            </div>

            <div id="uploadStatusAlert" class="alert" style="display: none;">
                <p id="uploadStatusMessage"></p>
            </div>

            <div class="gallery-filters">
                <select id="groupFilter">
                    <option value="">All Groups</option>
                </select>
            </div>

            <div id="galleryContainer" class="gallery-grid">
                <p class="empty-state">Loading pictures...</p>
            </div>
        </div>
    </section>

    <div id="lightbox" class="lightbox" aria-hidden="true">
        <div class="lightbox-content" role="dialog" aria-modal="true">
            <button id="lightboxClose" class="lightbox-close" aria-label="Close image">&times;</button>
            <img id="lightboxImage" class="lightbox-image" alt="Enlarged photo">
            <div class="lightbox-meta">
                <p id="lightboxDate" class="lightbox-date"></p>
                <p id="lightboxCaption" class="lightbox-caption"></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        const { createClient } = window.supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY);

        const galleryContainer = document.getElementById('galleryContainer');
        const groupFilter = document.getElementById('groupFilter');
        const lightbox = document.getElementById('lightbox');
        const lightboxImage = document.getElementById('lightboxImage');
        const lightboxDate = document.getElementById('lightboxDate');
        const lightboxCaption = document.getElementById('lightboxCaption');
        const lightboxClose = document.getElementById('lightboxClose');

        // Load user's groups for filter
        async function loadGroupsForFilter() {
            try {
                const { data: { user }, error: userError } = await supabaseClient.auth.getUser();
                if (userError || !user) return;

                const { data: memberData } = await supabaseClient
                    .from('group_members')
                    .select('group_id, groups(id, name)')
                    .eq('user_id', user.id);

                if (memberData && memberData.length > 0) {
                    let html = '<option value="">All Groups</option>';
                    for (let member of memberData) {
                        html += `<option value="${member.groups.id}">${member.groups.name}</option>`;
                    }
                    groupFilter.innerHTML = html;
                }
            } catch (error) {
                console.error('Error loading groups:', error);
            }
        }

        // Helper: Calculate week start date (Monday of week) - MUST match uploadPictures.html
        function getWeekStartDate(date = new Date()) {
            const d = new Date(date);
            const dayOfWeek = d.getDay();
            const diffToMonday = d.getDate() - dayOfWeek + (dayOfWeek === 0 ? -6 : 1);
            d.setDate(diffToMonday);
            d.setHours(0, 0, 0, 0);
            d.setMinutes(0, 0, 0);
            return d.toISOString().split('T')[0];
        }

        // Check if user has uploaded 3+ photos this week
        async function checkUserWeeklyUploadStatus(userId) {
            try {
                const currentWeekStartStr = getWeekStartDate();

                const { data: thisWeekLogs, error } = await supabaseClient
                    .from('weekly_logs')
                    .select('photo_urls')
                    .eq('user_id', userId)
                    .eq('week_start_date', currentWeekStartStr);

                if (error) {
                    console.error('Error querying this week logs:', error);
                    return { hasRequiredPhotos: false, lastUploadWeekStart: null };
                }

                // Count total photos uploaded this week
                let photoCount = 0;
                if (thisWeekLogs && thisWeekLogs.length > 0) {
                    for (let log of thisWeekLogs) {
                        if (log.photo_urls && Array.isArray(log.photo_urls)) {
                            photoCount += log.photo_urls.length;
                        }
                    }
                }

                if (photoCount >= 3) {
                    return { hasRequiredPhotos: true, lastUploadWeekStart: null };
                }

                // Find last upload week
                const { data: allLogs } = await supabaseClient
                    .from('weekly_logs')
                    .select('week_start_date, photo_urls')
                    .eq('user_id', userId)
                    .order('week_start_date', { ascending: false })
                    .limit(10);

                let lastUploadWeekStart = null;
                if (allLogs && allLogs.length > 0) {
                    // Find the most recent week with uploads
                    for (let log of allLogs) {
                        if (log.week_start_date !== currentWeekStartStr && log.photo_urls && log.photo_urls.length > 0) {
                            lastUploadWeekStart = log.week_start_date;
                            break;
                        }
                    }
                }

                return { hasRequiredPhotos: false, lastUploadWeekStart };
            } catch (error) {
                console.error('Error checking upload status:', error);
                return { hasRequiredPhotos: false, lastUploadWeekStart: null };
            }
        }

        // Calculate days behind
        function calculateDaysBehind(lastUploadWeekStart) {
            if (!lastUploadWeekStart) return null;

            const lastUploadDate = new Date(lastUploadWeekStart);
            const currentWeekStartStr = getWeekStartDate();
            const currentDate = new Date(currentWeekStartStr);

            const diffTime = Math.abs(currentDate - lastUploadDate);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

            return diffDays;
        }

        // Update status alert
        function updateStatusAlert(hasRequiredPhotos, daysBehind) {
            const alert = document.getElementById('uploadStatusAlert');
            const message = document.getElementById('uploadStatusMessage');

            if (hasRequiredPhotos) {
                alert.style.display = 'none';
            } else if (daysBehind !== null) {
                alert.classList.remove('success');
                alert.classList.add('warning');
                message.textContent = `You are ${daysBehind} days behind on your weekly photo uploads. Upload 3 photos this week to see all group photos!`;
                alert.style.display = 'block';
            } else {
                alert.classList.remove('success');
                alert.classList.add('warning');
                message.textContent = 'Upload 3 photos this week to see all group photos!';
                alert.style.display = 'block';
            }
        }

        // Load pictures with access restrictions
        async function loadPictures(groupId = null) {
            try {
                const { data: { user }, error: userError } = await supabaseClient.auth.getUser();
                if (userError || !user) {
                    galleryContainer.innerHTML = '<p class="empty-state">Please log in to view pictures</p>';
                    return;
                }

                // Check user's upload status
                const uploadStatus = await checkUserWeeklyUploadStatus(user.id);
                updateStatusAlert(uploadStatus.hasRequiredPhotos, calculateDaysBehind(uploadStatus.lastUploadWeekStart));

                // Get all groups user is member of
                const { data: memberData } = await supabaseClient
                    .from('group_members')
                    .select('group_id')
                    .eq('user_id', user.id);

                if (!memberData || memberData.length === 0) {
                    galleryContainer.innerHTML = '<p class="empty-state">No groups to view pictures from</p>';
                    return;
                }

                const groupIds = memberData.map(m => m.group_id);

                // Build query
                let query = supabaseClient
                    .from('weekly_logs')
                    .select('*')
                    .in('group_id', groupIds)
                    .order('week_start_date', { ascending: false })
                    .order('created_at', { ascending: false });

                // If user hasn't met weekly requirement, restrict to their last upload week
                if (!uploadStatus.hasRequiredPhotos && uploadStatus.lastUploadWeekStart) {
                    query = query.eq('week_start_date', uploadStatus.lastUploadWeekStart);
                } else if (!uploadStatus.hasRequiredPhotos && !uploadStatus.lastUploadWeekStart) {
                    // User has never uploaded, show nothing
                    galleryContainer.innerHTML = '<p class="empty-state">Upload 3 photos this week to view group photos</p>';
                    return;
                }

                if (groupId) {
                    query = query.eq('group_id', groupId);
                }

                const { data: logs, error } = await query;

                if (error) {
                    console.error('Query error:', error);
                    galleryContainer.innerHTML = '<p class="empty-state">Error loading pictures</p>';
                    return;
                }

                if (!logs || logs.length === 0) {
                    galleryContainer.innerHTML = '<p class="empty-state">No pictures available</p>';
                    return;
                }

                let html = '';
                for (let log of logs) {
                    if (!log.photo_urls || log.photo_urls.length === 0) continue;

                    for (let photoUrl of log.photo_urls) {
                        const uploadDate = new Date(log.created_at).toLocaleDateString('en-US', { 
                            year: 'numeric', 
                            month: 'short', 
                            day: 'numeric' 
                        });
                        const fileName = photoUrl.split('/').pop().split('-').slice(1).join('-');

                        const captionText = log.captions && log.captions[0] ? log.captions[0] : '';

                        html += `
                            <div class="gallery-item" data-photo="${photoUrl}" data-date="${uploadDate}" data-caption="${captionText}">
                                <img src="${photoUrl}" alt="${fileName}" class="gallery-image">
                                <div class="gallery-overlay">
                                    <div class="gallery-info">
                                        <p class="gallery-date">${uploadDate}</p>
                                        ${captionText ? `<p class="gallery-caption">${captionText}</p>` : ''}
                                    </div>
                                </div>
                            </div>
                        `;
                    }
                }

                galleryContainer.innerHTML = html || '<p class="empty-state">No pictures found</p>';
            } catch (error) {
                console.error('Error loading pictures:', error);
                galleryContainer.innerHTML = '<p class="empty-state">Error loading pictures</p>';
            }
        }

        // Filter change
        groupFilter.addEventListener('change', (e) => {
            loadPictures(e.target.value || null);
        });

        function openLightbox(photoUrl, dateText, captionText) {
            lightboxImage.src = photoUrl;
            lightboxDate.textContent = dateText || '';
            lightboxCaption.textContent = captionText || '';
            lightbox.classList.add('open');
            lightbox.setAttribute('aria-hidden', 'false');
            document.body.classList.add('no-scroll');
        }

        function closeLightbox() {
            lightbox.classList.remove('open');
            lightbox.setAttribute('aria-hidden', 'true');
            lightboxImage.src = '';
            document.body.classList.remove('no-scroll');
        }

        galleryContainer.addEventListener('click', (e) => {
            const item = e.target.closest('.gallery-item');
            if (!item) return;

            const photoUrl = item.dataset.photo;
            const dateText = item.dataset.date;
            const captionText = item.dataset.caption;
            openLightbox(photoUrl, dateText, captionText);
        });

        lightboxClose.addEventListener('click', closeLightbox);

        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox) {
                closeLightbox();
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && lightbox.classList.contains('open')) {
                closeLightbox();
            }
        });

        // Load on page load
        loadGroupsForFilter();
        loadPictures();
    </script>
