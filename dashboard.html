<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        .dashboard-container {
            display: flex;
            gap: 30px;
            align-items: flex-start;
            margin-top: 20px;
        }

        .profile-sidebar {
            flex: 0 0 auto;
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 30px;
            margin-left: 30px;
            margin-top: 20px;
        }

        .profile-picture-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .profile-picture-section h1 {
            margin-top: 100px;
        }

        .profile-picture-container {
            position: relative;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            overflow: hidden;
            background-color: #CA3F3F;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .profile-picture {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-action-btn {
            padding: 0.75rem 1.5rem;
            background-color: var(--primary-color);
            color: var(--bg-light);
            border: 4px solid var(--border-color);
            border-radius: 0;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 900;
            letter-spacing: 1px;
            transition: transform 0.1s ease, box-shadow 0.1s ease, background-color 0.1s ease;
            box-shadow: 4px 4px 0px rgba(48, 54, 74, 0.2);
            font-family: inherit;
        }

        .profile-action-btn:hover {
            background-color: var(--accent-red);
            transform: translateY(-2px);
            box-shadow: 6px 6px 0px rgba(48, 54, 74, 0.2);
        }

        .profile-action-btn:active {
            transform: translateY(0);
            box-shadow: 2px 2px 0px rgba(48, 54, 74, 0.15);
        }

        .profile-input {
            padding: 0.75rem 1rem;
            border: 4px solid var(--border-color);
            background-color: var(--bg-light);
            font-size: 0.9rem;
            font-family: inherit;
            font-weight: 700;
            letter-spacing: 1px;
            width: 220px;
        }

        .profile-input:focus {
            outline: none;
            border-color: var(--primary-color);
            background-color: #F8F2E5;
            box-shadow: 0 0 0 4px rgba(202, 63, 63, 0.15);
        }

        .username {
            font-weight: 900;
            letter-spacing: 1px;
            cursor: pointer;
            padding: 0.25rem 0;
        }

        .group-info {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-left: 20px;
        }

        .group-name {
            font-size: 60px;
            font-weight: bold;
            color: #333;
            margin-left: 40px;
            margin-top: -30px;
        }

        .group-description {
            font-size: 14px;
            color: #666;
            max-width: 250px;
        }

        .file-input-hidden {
            display: none;
        }

        .dashboard-content {
            flex: 1;
        }

        .dashboard h2 {
            margin-top: 30px;
            margin-bottom: 10px;
        }

        @media (max-width: 768px) {
            .dashboard-container {
                flex-direction: column;
                align-items: center;
            }

            .profile-sidebar {
                flex: 0 0 auto;
                flex-direction: column;
                margin-left: 0;
            }

            .profile-picture-section {
                width: 100%;
            }

            .dashboard-content {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="navbar-brand">
                <img src="images/new splat.png" alt="Katchup Logo" class="logo">
                <h1>Katchup</h1>
            </div>
            <div class="navbar-menu">
                <a href="dashboard.html" class="nav-link">Home</a>
                <a href="pictureGallery.html" class="nav-link btn-tertiary">Pictures</a>
                <a href="letterLog.html" class="nav-link btn-tertiary">Letter Logs</a>
                <a href="schedule.html" class="nav-link btn-tertiary">Schedule</a>
                <button class="hamburger-btn" id="hamburger">
                    <span class="bar"></span>
                    <span class="bar"></span>
                    <span class="bar"></span>
                </button>
                <!--hamburger menu links-->
                <ul class="hamburger-menu">
                    <!-- TO DO: CREATE PAGES AND LINK THEM-->
                    <li><a href="groups.html" class="nav-link">Manage Groups</a></li>
                    <li><a href="uploadPictures.html" class="nav-link">Upload Pictures</a></li>
                    <li><a href="dailyLogs.html" class="nav-link btn-tertiary">Write a Letter</a></li>
                    <li><a href="updateSchedule.html" class="nav-link btn-tertiary">Find a Time</a></li>
                    <!--<li><button id="logout-btn" class="nav-link btn-tertiary" style="width: 100%; text-align: left; border: none; background: none; cursor: pointer; padding: 0.75rem 1rem;">Logout</button></li>-->
                    <li><a href="#" id="logout-btn" class="nav-link btn-tertiary">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Dashboard Content -->
    <section class="dashboard">
        <div class="container">
            <h2>Welcome to Your Dashboard</h2>
            <div class="dashboard-container">
                <!-- Profile Sidebar -->
                <div class="profile-sidebar">
                    <div class="profile-picture-section">
                        <div class="profile-picture-container">
                            <img id="profileImage" class="profile-picture" src="images/unknown user.webp" alt="Profile Picture">
                        </div>
                        <div class="username"></div>
                        <input type="text" id="usernameInput" class="file-input-hidden profile-input" placeholder="Enter new username">
                        <button class="profile-action-btn" id="changePictureBtn">Change Picture</button>
                        <input type="file" id="fileInput" class="file-input-hidden" accept="image/*">
                    </div>
                    <div class="username-section">
                        <!-- ADD USERNAME, BE ABLE TO CHANGE USERNAME-->
                    </div>
                </div>

                <!-- Main Dashboard Content -->
                <div class="dashboard-content">
                    <div class="notifications-header">
                        <h3>Notifications</h3>
                        <button type="button" id="clearNotificationsBtn" class="btn-secondary">Clear All</button>
                    </div>
                    <div id="notificationsList" class="notifications-list">
                        <p class="empty-state">No new notifications</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
    <script>
        const { createClient } = window.supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY);
        const notificationsList = document.getElementById('notificationsList');
        const clearNotificationsBtn = document.getElementById('clearNotificationsBtn');
        let currentUserId = null;

        // Load and display notifications
        async function loadNotifications() {
            try {
                const { data: { user }, error: userError } = await supabaseClient.auth.getUser();
                if (userError || !user) {
                    notificationsList.innerHTML = '<p class="empty-state">Please log in</p>';
                    return;
                }

                const savedProfilePicture = localStorage.getItem('profilePicture');
                if (savedProfilePicture) {
                    profileImage.src = savedProfilePicture;
                }

                const { data: userData } = await supabaseClient
                    .from('profiles')
                    .select('username')
                    .eq('id', user.id)
                    .single();

                if (userData) {
                    document.querySelector('.username').textContent = userData.username;
                }

                currentUserId = user.id;
                console.log('Current user:', user.id);

                // Get user's groups
                const { data: memberData } = await supabaseClient
                    .from('group_members')
                    .select('group_id')
                    .eq('user_id', user.id);

                console.log('User groups:', memberData);

                if (!memberData || memberData.length === 0) {
                    notificationsList.innerHTML = '<p class="empty-state">No group notifications</p>';
                    clearNotificationsBtn.disabled = true;
                    return;
                }

                const groupIds = memberData.map(m => m.group_id);
                console.log('Group IDs:', groupIds);

                // DEBUG: Check all notifications in groups (no recipient filter)
                const { data: allNotifs } = await supabaseClient
                    .from('notifications')
                    .select('id, user_id, recipient_id, group_id, type, letter_title, created_at')
                    .in('group_id', groupIds)
                    .limit(10);
                console.log('ALL notifications in groups (no filter):', allNotifs);

                // Fetch notifications for user's groups, excluding their own
                const { data: notifications, error } = await supabaseClient
                    .from('notifications')
                    .select('*')
                    .in('group_id', groupIds)
                    .eq('recipient_id', user.id)
                    .order('created_at', { ascending: false })
                    .limit(20);

                console.log('Notifications query error:', error);
                console.log('Notifications data:', notifications);

                if (error) {
                    console.error('Error loading notifications:', error);
                    notificationsList.innerHTML = '<p class="empty-state">Error loading notifications: ' + error.message + '</p>';
                    clearNotificationsBtn.disabled = true;
                    return;
                }

                if (!notifications || notifications.length === 0) {
                    notificationsList.innerHTML = '<p class="empty-state">No new notifications</p>';
                    clearNotificationsBtn.disabled = true;
                    return;
                }

                clearNotificationsBtn.disabled = false;
                
                const userIds = [...new Set(notifications.map(n => n['user_id']))];
                console.log('User IDs from notifications:', userIds);
                console.log('first:', userIds[0]);
                console.log('Type:', typeof userIds[0]);
                const { data: profiles } = await supabaseClient
                    .from('profiles')
                    .select('id, username')
                    .in('id', userIds);

                console.log('Profiles for notification users:', profiles);
                

                const usernameMap = {};
                if (profiles) {
                    for (let profile of profiles) {
                        usernameMap[profile.id] = profile.username;
                    }
                }

                console.log('username map:',  usernameMap);
                console.log('first notif:', notifications[0]);

                let html = '';
                for (let notif of notifications) {
                    const userName = usernameMap[notif.user_id] || 'A friend';
                    const normalizedUserName = userName.toLowerCase().trim().replace(/\s+/g, '_');
                    const title = `${normalizedUserName}.exe`;
                    let message = '';
                    let href = '';
                    let actionLabel = '';

                    if (notif.type === 'photos_uploaded') {
                        message = `${userName} finished their weekly photo upload!`;
                    } else if (notif.type === 'letter_written') {
                        message = `${userName} wrote a new letter: "${notif.letter_title || 'Letter'}"`;
                    } else if (notif.type === 'poll_created') {
                        message = `${userName} created a poll: "${notif.letter_title || 'Poll'}"`;
                        if (notif.poll_id) {
                            href = `updateSchedule.html?pollId=${notif.poll_id}`;
                            actionLabel = 'View Poll';
                        }
                    }

                    const timestamp = new Date(notif.created_at).toLocaleDateString('en-US', {
                        month: 'short',
                        day: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit'
                    });

                    const isCardClickable = href && !actionLabel;
                    html += `
                        <div class="notification-item${isCardClickable ? ' is-clickable' : ''}" data-id="${notif.id}"${isCardClickable ? ` data-href="${href}"` : ''}>
                            <p class="notification-title">${title}</p>
                            <button type="button" class="notification-dismiss" aria-label="Dismiss notification">×</button>
                            <p class="notification-message">${message}</p>
                            ${actionLabel ? `<button type="button" class="notification-action" data-href="${href}">${actionLabel}</button>` : ''}
                            <p class="notification-time">${timestamp}</p>
                        </div>
                    `;
                }

                notificationsList.innerHTML = html;
            } catch (error) {
                console.error('Error in loadNotifications:', error);
                notificationsList.innerHTML = '<p class="empty-state">Error loading notifications: ' + error.message + '</p>';
                clearNotificationsBtn.disabled = true;
            }
        }

        clearNotificationsBtn.addEventListener('click', async () => {
            if (!currentUserId) {
                return;
            }

            const { error } = await supabaseClient
                .from('notifications')
                .delete()
                .eq('recipient_id', currentUserId);

            if (error) {
                alert('Failed to clear notifications. Please try again.');
                return;
            }

            loadNotifications();
        });

        notificationsList.addEventListener('click', async function(event) {
            const dismissBtn = event.target.closest('.notification-dismiss');
            if (dismissBtn) {
                const card = dismissBtn.closest('.notification-item');
                if (card) {
                    const notificationId = card.dataset.id;
                    const { error } = await supabaseClient
                        .from('notifications')
                        .delete()
                        .eq('id', notificationId);

                    if (error) {
                        alert('Failed to delete notification. Please try again.');
                        return;
                    }

                    card.remove();
                    if (!notificationsList.querySelector('.notification-item')) {
                        notificationsList.innerHTML = '<p class="empty-state">No new notifications</p>';
                    }
                }
                return;
            }

            const actionBtn = event.target.closest('.notification-action');
            if (actionBtn && actionBtn.dataset.href) {
                window.location.href = actionBtn.dataset.href;
                return;
            }

            const card = event.target.closest('.notification-item.is-clickable');
            if (card && card.dataset.href) {
                window.location.href = card.dataset.href;
            }
        });

        // Profile picture functionality
        const changePictureBtn = document.getElementById('changePictureBtn');
        const fileInput = document.getElementById('fileInput');
        const profileImage = document.getElementById('profileImage');

        // Load saved profile picture from localStorage
        window.addEventListener('DOMContentLoaded', function() {
            loadNotifications();
        });

        // Handle change picture button click
        changePictureBtn.addEventListener('click', function() {
            fileInput.click();
        });

        // Handle file input change
        fileInput.addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file && file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const imageData = e.target.result;
                    profileImage.src = imageData;
                    // Save to localStorage
                    localStorage.setItem('profilePicture', imageData);
                };
                reader.readAsDataURL(file);
            } else {
                alert('Please select a valid image file.');
            }
        });

        const usernameDisplay = document.querySelector('.username');
        const usernameInput = document.getElementById('usernameInput');

        async function saveUsername() {
            const newUsername = usernameInput.value.trim();
            if (!newUsername) {
                usernameInput.style.display = 'none';
                usernameInput.value = '';
                return;
            }

            const { data: { user } } = await supabaseClient.auth.getUser();
            const { error } = await supabaseClient
                .from('profiles')
                .update({ username: newUsername })
                .eq('id', user.id);

            if (!error) {
                usernameDisplay.textContent = newUsername;
                usernameInput.style.display = 'none';
                usernameInput.value = '';
            } else {
                alert('Error updating username');
            }
        }

        usernameDisplay.addEventListener('click', () => {
            usernameInput.style.display = 'block';
            usernameInput.value = usernameDisplay.textContent.trim();
            usernameInput.focus();
            usernameInput.select();
        });

        usernameInput.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                event.preventDefault();
                saveUsername();
            }
        });

        usernameInput.addEventListener('blur', () => {
            if (usernameInput.style.display === 'block') {
                saveUsername();
            }
        });
           

        // Refresh notifications every 30 seconds
        setInterval(loadNotifications, 30000);
    </script>

    <!-- Footer -->
    <footer class="footer" style="margin-top: 48px;">
        <div class="container">
            <p>&copy; 2026 Katchup. All rights reserved.</p>
        </div>
    </footer>
</body>
