<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        .dashboard-container {
            display: flex;
            gap: 30px;
            align-items: flex-start;
            margin-top: 20px;
        }

        .profile-sidebar {
            flex: 0 0 auto;
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 30px;
            margin-left: 30px;
            margin-top: 20px;
        }

        .profile-picture-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .profile-picture-section h1 {
            margin-top: 100px;
        }

        .profile-picture-container {
            position: relative;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            overflow: hidden;
            background-color: #CA3F3F;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .profile-picture {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .change-picture-btn {
            padding: 10px 20px;
            background-color: #304A36;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.3s;
        }

        .change-picture-btn:hover {
            background-color: #2a3d2e;
        }

        .change-picture-btn:active {
            transform: scale(0.98);
        }

        .group-info {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-left: 20px;
        }

        .group-name {
            font-size: 60px;
            font-weight: bold;
            color: #333;
            margin-left: 40px;
            margin-top: -30px;
        }

        .group-description {
            font-size: 14px;
            color: #666;
            max-width: 250px;
        }

        .file-input-hidden {
            display: none;
        }

        .dashboard-content {
            flex: 1;
        }

        .dashboard h2 {
            margin-top: 30px;
            margin-bottom: 10px;
        }

        @media (max-width: 768px) {
            .dashboard-container {
                flex-direction: column;
                align-items: center;
            }

            .profile-sidebar {
                flex: 0 0 auto;
                flex-direction: column;
                margin-left: 0;
            }

            .profile-picture-section {
                width: 100%;
            }

            .dashboard-content {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="navbar-brand">
                <h1>Katchup</h1>
            </div>
            <div class="navbar-menu">
                <img src="images/splat.png" alt="Katchup Logo" class="logo">
                <a href="dashboard.html" class="nav-link">Home</a>
                <a href="pictureGallery.html" class="nav-link btn-tertiary">Pictures</a>
                <a href="letterLog.html" class="nav-link btn-tertiary">Letter Logs</a>
                <a href="schedule.html" class="nav-link btn-tertiary">Schedule</a>
                <button class="hamburger-btn" id="hamburger">
                    <span class="bar"></span>
                    <span class="bar"></span>
                    <span class="bar"></span>
                </button>
                <!--hamburger menu links-->
                <ul class="hamburger-menu">
                    <!-- TO DO: CREATE PAGES AND LINK THEM-->
                    <li><a href="groups.html" class="nav-link">Manage Groups</a></li>
                    <li><a href="uploadPictures.html" class="nav-link">Upload Pictures</a></li>
                    <li><a href="dailyLogs.html" class="nav-link btn-tertiary">Write a Letter</a></li>
                    <li><a href="updateSchedule.html" class="nav-link btn-tertiary">Update Schedule</a></li>
                    <li><button id="logout-btn" class="nav-link btn-tertiary" style="width: 100%; text-align: left; border: none; background: none; cursor: pointer; padding: 0.75rem 1rem;">Logout</button></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Dashboard Content -->
    <section class="dashboard">
        <div class="container">
            <h2>Welcome to Your Dashboard</h2>
            <div class="dashboard-container">
                <!-- Profile Sidebar -->
                <div class="profile-sidebar">
                    <div class="profile-picture-section">
                        <div class="profile-picture-container">
                            <img id="profileImage" class="profile-picture" src="images/unknown user.webp" alt="Profile Picture">
                        </div>
                        <button class="change-picture-btn" id="changePictureBtn">Change Picture</button>
                        <input type="file" id="fileInput" class="file-input-hidden" accept="image/*">
                    </div>
                    <div class="username-section">
                        <!-- ADD USERNAME, BE ABLE TO CHANGE USERNAME-->
                        <div class="username">username</div>
                        <button class="change-username-btn">Change Username</button>
                        <input type="text" id="usernameInput" class="file-input-hidden" placeholder="Enter new username">
                    </div>
                </div>

                <!-- Main Dashboard Content -->
                <div class="dashboard-content">
                    <h3>Notifications</h3>
                    <div id="notificationsList" class="notifications-list">
                        <p class="empty-state">No new notifications</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
    <script>
        const { createClient } = window.supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY);
        const notificationsList = document.getElementById('notificationsList');

        // Load and display notifications
        async function loadNotifications() {
            try {
                const { data: { user }, error: userError } = await supabaseClient.auth.getUser();
                if (userError || !user) {
                    notificationsList.innerHTML = '<p class="empty-state">Please log in</p>';
                    return;
                }

                // Load profile picture from Supabase
                const { data: profile, error: profileError } = await supabaseClient
                    .from('profiles')
                    .select('avatar_url, updated_at')
                    .eq('id', user.id)
                    .maybeSingle();

                if (!profileError && profile?.avatar_url) {
                    const cacheKey = profile.updated_at ? new Date(profile.updated_at).getTime() : Date.now();
                    profileImage.src = `${profile.avatar_url}?t=${cacheKey}`;
                }

                console.log('Current user:', user.id);

                // Get user's groups
                const { data: memberData } = await supabaseClient
                    .from('group_members')
                    .select('group_id')
                    .eq('user_id', user.id);

                console.log('User groups:', memberData);

                if (!memberData || memberData.length === 0) {
                    notificationsList.innerHTML = '<p class="empty-state">No group notifications</p>';
                    return;
                }

                const groupIds = memberData.map(m => m.group_id);
                console.log('Group IDs:', groupIds);

                // DEBUG: Check all notifications in groups (no recipient filter)
                const { data: allNotifs } = await supabaseClient
                    .from('notifications')
                    .select('*')
                    .in('group_id', groupIds)
                    .limit(10);
                console.log('ALL notifications in groups (no filter):', allNotifs);

                // Fetch notifications for user's groups, excluding their own
                const { data: notifications, error } = await supabaseClient
                    .from('notifications')
                    .select('*')
                    .in('group_id', groupIds)
                    .eq('recipient_id', user.id)
                    .order('created_at', { ascending: false })
                    .limit(20);

                console.log('Notifications query error:', error);
                console.log('Notifications data:', notifications);

                if (error) {
                    console.error('Error loading notifications:', error);
                    notificationsList.innerHTML = '<p class="empty-state">Error loading notifications: ' + error.message + '</p>';
                    return;
                }

                if (!notifications || notifications.length === 0) {
                    notificationsList.innerHTML = '<p class="empty-state">No new notifications</p>';
                    return;
                }

                let html = '';
                for (let notif of notifications) {
                    const userName = 'A friend';
                    let message = '';

                    if (notif.type === 'photos_uploaded') {
                        message = `${userName} finished their weekly photo upload!`;
                    } else if (notif.type === 'letter_written') {
                        message = `${userName} wrote a new letter: "${notif.letter_title || 'Letter'}"`;
                    }

                    const timestamp = new Date(notif.created_at).toLocaleDateString('en-US', {
                        month: 'short',
                        day: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit'
                    });

                    html += `
                        <div class="notification-item">
                            <p class="notification-message">${message}</p>
                            <p class="notification-time">${timestamp}</p>
                        </div>
                    `;
                }

                notificationsList.innerHTML = html;
            } catch (error) {
                console.error('Error in loadNotifications:', error);
                notificationsList.innerHTML = '<p class="empty-state">Error loading notifications: ' + error.message + '</p>';
            }
        }

        // Profile picture functionality
        const changePictureBtn = document.getElementById('changePictureBtn');
        const fileInput = document.getElementById('fileInput');
        const profileImage = document.getElementById('profileImage');

        async function convertImageToJpeg(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = img.naturalWidth;
                        canvas.height = img.naturalHeight;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0);

                        canvas.toBlob((blob) => {
                            if (!blob) {
                                reject(new Error('Could not convert image to JPEG.'));
                                return;
                            }
                            resolve(blob);
                        }, 'image/jpeg', 0.9);
                    };
                    img.onerror = () => reject(new Error('Could not read selected image.'));
                    img.src = reader.result;
                };
                reader.onerror = () => reject(new Error('Could not load selected file.'));
                reader.readAsDataURL(file);
            });
        }

        async function uploadAvatar(file, userId) {
            const jpegBlob = await convertImageToJpeg(file);
            const filePath = `avatars/${userId}/avatar.jpg`;

            const { error } = await supabaseClient
                .storage
                .from('profile')
                .upload(filePath, jpegBlob, {
                    cacheControl: '3600',
                    contentType: 'image/jpeg',
                    upsert: true
                });

            if (error) {
                throw new Error(error.message);
            }

            const { data: urlData } = supabaseClient
                .storage
                .from('profile')
                .getPublicUrl(filePath);

            return { avatarUrl: urlData.publicUrl, path: filePath };
        }

        // Load saved profile picture from localStorage
        window.addEventListener('DOMContentLoaded', function() {
            loadNotifications();
        });

        // Handle change picture button click
        changePictureBtn.addEventListener('click', function() {
            fileInput.value = '';
            fileInput.click();
        });

        // Handle file input change
        fileInput.addEventListener('change', async function(event) {
            const file = event.target.files[0];
            if (file && file.type.startsWith('image/')) {
                // Validate file size (max 5MB)
                const maxSize = 5 * 1024 * 1024;
                if (file.size > maxSize) {
                    alert('File size must be less than 5MB');
                    return;
                }

                try {
                    // Get current user
                    const { data: { user } } = await supabaseClient.auth.getUser();
                    if (!user) {
                        alert('Please log in first');
                        return;
                    }

                    // Show loading state
                    changePictureBtn.textContent = 'Uploading...';
                    changePictureBtn.disabled = true;

                    // Always overwrite one file per user: profile/avatars/{uid}/avatar.jpg
                    const { avatarUrl, path } = await uploadAvatar(file, user.id);
                    console.log('Avatar uploaded to:', `profile/${path}`);

                    // Upsert profile row so first-time uploads also work
                    const { error: updateError } = await supabaseClient
                        .from('profiles')
                        .upsert({
                            id: user.id,
                            avatar_url: avatarUrl,
                            updated_at: new Date().toISOString()
                        }, { onConflict: 'id' });

                    if (updateError) {
                        console.error('Profile update error:', updateError);
                        alert('Failed to save profile photo: ' + updateError.message);
                        return;
                    }

                    // Update UI
                    profileImage.src = `${avatarUrl}?t=${Date.now()}`;
                    alert('Profile picture updated successfully!');

                } catch (error) {
                    console.error('Error:', error);
                    alert('An error occurred while updating profile picture: ' + error.message);
                } finally {
                    // Reset button state
                    changePictureBtn.textContent = 'Change Picture';
                    changePictureBtn.disabled = false;
                    fileInput.value = '';
                }
            } else {
                alert('Please select a valid image file.');
            }
        });

        // Refresh notifications every 30 seconds
        setInterval(loadNotifications, 30000);
    </script>
</body>
</html>
