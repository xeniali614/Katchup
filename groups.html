<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Groups - Katchup</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="navbar-brand">
                <h1>Katchup</h1>
            </div>
            <div class="navbar-menu">
                <a href="/">
                    <!--ADD LOGO-->
                    <img src="images/splat.png" alt="Katchup Logo" class="logo">
                </a>
                <a href="dashboard.html" class="nav-link">Home</a>
                <a href="pictureGallery.html" class="nav-link btn-tertiary">Pictures</a>
                <a href="letterLog.html" class="nav-link btn-tertiary">Letter Logs</a>
                <a href="schedule.html" class="nav-link btn-tertiary">Schedule</a>
                <button class="hamburger-btn" id="hamburger">
                    <span class="bar"></span>
                    <span class="bar"></span>
                    <span class="bar"></span>
                </button>
                <!--hamburger menu links-->
                <ul class="hamburger-menu">
                    <li><a href="groups.html" class="nav-link">Manage Groups</a></li>
                    <li><a href="uploadPictures.html" class="nav-link">Upload Pictures</a></li>
                    <li><a href="dailyLogs.html" class="nav-link btn-tertiary">Write a Letter</a></li>
                    <li><a href="updateSchedule.html" class="nav-link btn-tertiary">Update Schedule</a></li>
                    <li><button id="logout-btn" class="nav-link btn-tertiary" style="width: 100%; text-align: left; border: none; background: none; cursor: pointer; padding: 0.75rem 1rem;">Logout</button></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Groups Section -->
    <section class="groups-section">
        <div class="container">
            <div class="section-header">
                <h2>Manage Groups</h2>
                <p>Create groups with friends or join existing groups to share memories together.</p>
            </div>

            <!-- Create Group Tab -->
            <div class="groups-tabs">
                <button class="tab-btn active" data-tab="create">Create Group</button>
                <button class="tab-btn" data-tab="join">Join Group</button>
                <button class="tab-btn" data-tab="my-groups">My Groups</button>
            </div>

            <!-- Create Group Form -->
            <div id="create-tab" class="tab-content active">
                <div class="form-card">
                    <h3>Create a New Group</h3>
                    <form id="createGroupForm" class="group-form">
                        <div class="form-group">
                            <label for="groupName">Group Name</label>
                            <input 
                                type="text" 
                                id="groupName" 
                                name="groupName" 
                                placeholder="e.g., College Friends, Family"
                                required
                            >
                        </div>

                        <button type="submit" class="btn-primary btn-submit">Create Group</button>
                    </form>
                    <div id="createMessage" class="message"></div>
                </div>
            </div>

            <!-- Join Group Form -->
            <div id="join-tab" class="tab-content">
                <div class="form-card">
                    <h3>Join an Existing Group</h3>
                    <form id="joinGroupForm" class="group-form">
                        <div class="form-group">
                            <label for="inviteCode">Invite Code</label>
                            <input 
                                type="text" 
                                id="inviteCode" 
                                name="inviteCode" 
                                placeholder="Enter the invite code"
                                required
                            >
                        </div>

                        <button type="submit" class="btn-primary btn-submit">Join Group</button>
                    </form>
                    <div id="joinMessage" class="message"></div>
                </div>
            </div>

            <!-- My Groups -->
            <div id="my-groups-tab" class="tab-content">
                <h3>Your Groups</h3>
                <div id="groupsList" class="groups-list">
                    <p class="empty-state">Loading groups...</p>
                </div>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
    <script>
        const { createClient } = window.supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY);

        const createGroupForm = document.getElementById('createGroupForm');
        const joinGroupForm = document.getElementById('joinGroupForm');
        const createMessage = document.getElementById('createMessage');
        const joinMessage = document.getElementById('joinMessage');
        const groupsList = document.getElementById('groupsList');
        const tabs = document.querySelectorAll('.tab-btn');
        const tabContents = document.querySelectorAll('.tab-content');

        // Tab switching
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tabContents.forEach(c => c.classList.remove('active'));
                
                tab.classList.add('active');
                document.getElementById(`${tab.dataset.tab}-tab`).classList.add('active');
            });
        });

        // Generate invite code
        function generateInviteCode() {
            return Math.random().toString(36).substring(2, 8).toUpperCase();
        }

        // Create group
        createGroupForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const groupName = document.getElementById('groupName').value;

            try {
                const { data: { user }, error: userError } = await supabaseClient.auth.getUser();
                if (userError || !user) {
                    showMessage('Please log in first', 'error', 'create');
                    return;
                }

                const submitBtn = createGroupForm.querySelector('button[type="submit"]');
                submitBtn.disabled = true;
                submitBtn.textContent = 'Creating...';

                const inviteCode = generateInviteCode();

                // Create group
                const { data: groupData, error: groupError } = await supabaseClient
                    .from('groups')
                    .insert([
                        {
                            name: groupName,
                            creator_id: user.id,
                            invite_code: inviteCode
                        }
                    ])
                    .select();

                if (groupError) {
                    showMessage('Failed to create group', 'error', 'create');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Create Group';
                    return;
                }

                const groupId = groupData[0].id;

                // Add creator as member
                const { error: memberError } = await supabaseClient
                    .from('group_members')
                    .insert([
                        {
                            group_id: groupId,
                            user_id: user.id
                        }
                    ]);

                if (!memberError) {
                    showMessage(`Group created! Invite code: ${inviteCode}`, 'success', 'create');
                    createGroupForm.reset();
                    loadGroups();
                } else {
                    showMessage('Group created but failed to add you as member', 'error', 'create');
                }

                submitBtn.disabled = false;
                submitBtn.textContent = 'Create Group';
            } catch (error) {
                showMessage('An error occurred: ' + error.message, 'error', 'create');
                const submitBtn = createGroupForm.querySelector('button[type="submit"]');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Create Group';
            }
        });

        // Join group
        joinGroupForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const inviteCode = document.getElementById('inviteCode').value.toUpperCase();

            try {
                const { data: { user }, error: userError } = await supabaseClient.auth.getUser();
                if (userError || !user) {
                    showMessage('Please log in first', 'error', 'join');
                    return;
                }

                const submitBtn = joinGroupForm.querySelector('button[type="submit"]');
                submitBtn.disabled = true;
                submitBtn.textContent = 'Joining...';

                // Find group by invite code
                const { data: groupData, error: groupError } = await supabaseClient
                    .from('groups')
                    .select('id, name')
                    .eq('invite_code', inviteCode)
                    .single();

                if (groupError || !groupData) {
                    showMessage('Invalid invite code', 'error', 'join');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Join Group';
                    return;
                }

                // Add user to group
                const { error: joinError } = await supabaseClient
                    .from('group_members')
                    .insert([
                        {
                            group_id: groupData.id,
                            user_id: user.id
                        }
                    ]);

                if (joinError) {
                    if (joinError.message.includes('duplicate')) {
                        showMessage('You are already a member of this group', 'error', 'join');
                    } else {
                        showMessage('Failed to join group', 'error', 'join');
                    }
                } else {
                    showMessage(`Successfully joined ${groupData.name}!`, 'success', 'join');
                    joinGroupForm.reset();
                    loadGroups();
                }

                submitBtn.disabled = false;
                submitBtn.textContent = 'Join Group';
            } catch (error) {
                showMessage('An error occurred: ' + error.message, 'error', 'join');
                const submitBtn = joinGroupForm.querySelector('button[type="submit"]');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Join Group';
            }
        });

        // Load user's groups
        async function loadGroups() {
            try {
                const { data: { user }, error: userError } = await supabaseClient.auth.getUser();
                if (userError || !user) {
                    groupsList.innerHTML = '<p class="empty-state">Please log in to see your groups</p>';
                    return;
                }

                const { data: memberData, error: memberError } = await supabaseClient
                    .from('group_members')
                    .select('group_id, groups(id, name, invite_code, creator_id)')
                    .eq('user_id', user.id);

                if (memberError || !memberData || memberData.length === 0) {
                    groupsList.innerHTML = '<p class="empty-state">You are not in any groups yet. Create or join one!</p>';
                    return;
                }

                let html = '';
                for (let member of memberData) {
                    const group = member.groups;
                    const isCreator = group.creator_id === user.id;
                    
                    // Get group members
                    const { data: groupMembers } = await supabaseClient
                        .from('group_members')
                        .select('user_id, profiles(username)')
                        .eq('group_id', group.id);

                    let membersHtml = '';
                    if (groupMembers && groupMembers.length > 0) {
                        membersHtml = '<div class="group-members"><strong>Members:</strong><ul>';
                        for (let gm of groupMembers) {
                            membersHtml += `<li>${gm.profiles?.username || 'Unknown'}</li>`;
                        }
                        membersHtml += '</ul></div>';
                    }
                    
                    html += `
                        <div class="group-card">
                            <div class="group-header">
                                <div id="name-display-${group.id}" class="group-name-display">
                                    <h4>${group.name}</h4>
                                    ${isCreator ? '<span class="badge">Creator</span>' : ''}
                                </div>
                                <div id="name-edit-${group.id}" class="group-name-edit" style="display: none;">
                                    <input type="text" id="edit-input-${group.id}" class="group-name-input" value="${group.name}" />
                                </div>
                            </div>
                            <div class="group-content">
                                <p>Invite Code: <strong>${group.invite_code}</strong></p>
                                <button class="btn-copy" onclick="copyToClipboard('${group.invite_code}')">Copy Code</button>
                                ${membersHtml}
                                <div class="group-actions">
                                    ${isCreator ? `
                                        <button class="btn-secondary" onclick="toggleEditGroupName('${group.id}')">Edit Name</button>
                                        <div id="edit-actions-${group.id}" style="display: none; gap: 0.5rem;">
                                            <button class="btn-primary" onclick="saveGroupName('${group.id}')">Save</button>
                                            <button class="btn-secondary" onclick="cancelEditGroupName('${group.id}')">Cancel</button>
                                        </div>
                                        <button class="btn-danger" onclick="deleteGroup('${group.id}', '${group.name}')">Delete Group</button>
                                    ` : ''}
                                </div>
                            </div>
                        </div>
                    `;
                }
                groupsList.innerHTML = html;
            } catch (error) {
                console.error('Error loading groups:', error);
                groupsList.innerHTML = '<p class="empty-state">Error loading groups</p>';
            }
        }

        // Delete group
        async function deleteGroup(groupId, groupName) {
            if (!confirm(`Are you sure you want to delete "${groupName}"? This cannot be undone.`)) {
                return;
            }

            try {
                // Delete all members first
                const { error: deleteMembersError } = await supabaseClient
                    .from('group_members')
                    .delete()
                    .eq('group_id', groupId);

                if (deleteMembersError) {
                    alert('Error deleting group members');
                    return;
                }

                // Delete the group
                const { error: deleteGroupError } = await supabaseClient
                    .from('groups')
                    .delete()
                    .eq('id', groupId);

                if (deleteGroupError) {
                    alert('Error deleting group');
                    return;
                }

                alert(`"${groupName}" has been deleted successfully`);
                loadGroups();
            } catch (error) {
                console.error('Error deleting group:', error);
                alert('An error occurred while deleting the group');
            }
        }

        function showMessage(message, type, section) {
            const messageEl = section === 'create' ? createMessage : joinMessage;
            messageEl.textContent = message;
            messageEl.className = 'message ' + type;
            messageEl.style.display = 'block';

            if (type === 'success') {
                setTimeout(() => {
                    messageEl.style.display = 'none';
                }, 3000);
            }
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert('Invite code copied to clipboard!');
            });
        }

        // Toggle edit group name
        function toggleEditGroupName(groupId) {
            const displayDiv = document.getElementById(`name-display-${groupId}`);
            const editDiv = document.getElementById(`name-edit-${groupId}`);
            const actionsDiv = document.getElementById(`edit-actions-${groupId}`);
            const editButton = event.target;

            if (editDiv.style.display === 'none') {
                // Show edit mode
                displayDiv.style.display = 'none';
                editDiv.style.display = 'block';
                actionsDiv.style.display = 'flex';
                editButton.style.display = 'none';
                document.getElementById(`edit-input-${groupId}`).focus();
                document.getElementById(`edit-input-${groupId}`).select();
            }
        }

        // Cancel edit group name
        function cancelEditGroupName(groupId) {
            const displayDiv = document.getElementById(`name-display-${groupId}`);
            const editDiv = document.getElementById(`name-edit-${groupId}`);
            const actionsDiv = document.getElementById(`edit-actions-${groupId}`);
            const editButton = document.querySelector(`button[onclick="toggleEditGroupName('${groupId}')"]`);

            displayDiv.style.display = 'block';
            editDiv.style.display = 'none';
            actionsDiv.style.display = 'none';
            editButton.style.display = 'block';
        }

        // Save group name
        async function saveGroupName(groupId) {
            const newName = document.getElementById(`edit-input-${groupId}`).value.trim();

            if (!newName) {
                alert('Group name cannot be empty');
                return;
            }

            try {
                const { error } = await supabaseClient
                    .from('groups')
                    .update({ name: newName })
                    .eq('id', groupId);

                if (error) {
                    alert('Failed to update group name');
                    console.error('Error:', error);
                    return;
                }

                alert('Group name updated successfully!');
                loadGroups();
            } catch (error) {
                console.error('Error updating group name:', error);
                alert('An error occurred while updating the group name');
            }
        }

        // Load groups on page load
        loadGroups();
    </script>
</body>
</html>
