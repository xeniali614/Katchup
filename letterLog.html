<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Letter Logs - Katchup</title>
    <link rel="stylesheet" href="style.css">
    <script src="vendor/supabase.min.js"></script>
    <script src="config.js"></script>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="navbar-brand">
                <img src="images/new splat.png" alt="Katchup Logo" class="logo">
                <h1>Katchup</h1>
            </div>
            <div class="navbar-menu">
                <a href="dashboard.html" class="nav-link">Home</a>
                <a href="pictureGallery.html" class="nav-link btn-tertiary">Pictures</a>
                <a href="letterLog.html" class="nav-link btn-tertiary">Letter Logs</a>
                <a href="schedule.html" class="nav-link btn-tertiary">Schedule</a>
                <button class="hamburger-btn" id="hamburger">
                    <span class="bar"></span>
                    <span class="bar"></span>
                    <span class="bar"></span>
                </button>
                <!--hamburger menu links-->
                <ul class="hamburger-menu">
                    <!-- TO DO: CREATE PAGES AND LINK THEM-->
                    <li><a href="groups.html" class="nav-link">Manage Groups</a></li>
                    <li><a href="uploadPictures.html" class="nav-link">Upload Pictures</a></li>
                    <li><a href="dailyLogs.html" class="nav-link btn-tertiary">Write a Letter</a></li>
                    <li><a href="updateSchedule.html" class="nav-link btn-tertiary">Find a Time</a></li>
                    <li><a href="#" id="logout-btn" class="nav-link btn-tertiary">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Letter Logs Section -->
    <section class="upload-section">
        <div class="container">
            <div class="section-header">
                <h2>Letter Logs</h2>
                <p>Read letters shared by everyone in your groups.</p>
            </div>

            <div class="gallery-filters">
                <select id="letterGroupFilter">
                    <option value="">All Groups</option>
                </select>
            </div>

            <div id="lettersFeed" class="letters-grid">
                <p class="empty-state">Loading letters...</p>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
    <script>
        const { createClient } = window.supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY);

        const lettersFeed = document.getElementById('lettersFeed');
        const letterGroupFilter = document.getElementById('letterGroupFilter');
        let currentGroupId = '';

        async function loadGroupOptions() {
            try {
                const { data: { user }, error: userError } = await supabaseClient.auth.getUser();
                if (userError || !user) {
                    return;
                }

                const { data: memberData } = await supabaseClient
                    .from('group_members')
                    .select('group_id, groups(id, name)')
                    .eq('user_id', user.id);

                if (memberData && memberData.length > 0) {
                    let options = '<option value="">All Groups</option>';
                    for (let member of memberData) {
                        options += `<option value="${member.groups.id}">${member.groups.name}</option>`;
                    }
                    letterGroupFilter.innerHTML = options;
                }
            } catch (error) {
                console.error('Error loading groups:', error);
            }
        }

        async function loadLetters(groupId = null) {
            try {
                const { data: { user }, error: userError } = await supabaseClient.auth.getUser();
                if (userError || !user) {
                    lettersFeed.innerHTML = '<p class="empty-state">Please log in to view letters</p>';
                    return;
                }

                const { data: memberData } = await supabaseClient
                    .from('group_members')
                    .select('group_id')
                    .eq('user_id', user.id);

                if (!memberData || memberData.length === 0) {
                    lettersFeed.innerHTML = '<p class="empty-state">Join a group to see letters</p>';
                    return;
                }

                const groupIds = memberData.map((member) => member.group_id);

                let query = supabaseClient
                    .from('letters')
                    .select('id, title, content, created_at, group_id, user_id, groups(name))')
                    .in('group_id', groupIds)
                    .order('created_at', { ascending: false });

                if (groupId) {
                    query = query.eq('group_id', groupId);
                }

                const { data: letters, error } = await query;

                if (error) {
                    console.error('Letters query error:', error);
                    lettersFeed.innerHTML = `<p class="empty-state">Error loading letters: ${error.message}</p>`;
                    return;
                }

                if (!letters || letters.length === 0) {
                    lettersFeed.innerHTML = '<p class="empty-state">No letters shared yet</p>';
                    return;
                }

                const userIds = [...new Set(letters.map(l => l.user_id))];
                const { data: profiles } = await supabaseClient
                    .from('profiles')
                    .select('id, username')
                    .in('id', userIds);
                    
                const usernameMap = {};
                if(profiles){
                    for(let profile of profiles){
                        usernameMap[profile.id] = profile.username;
                    }
                }

                let html = '';
                for (let letter of letters) {
                    const dateText = new Date(letter.created_at).toLocaleDateString('en-US', {
                        year: 'numeric',
                        month: 'short',
                        day: 'numeric'
                    });
                    const groupName = letter.groups?.name || 'Unknown group';
                    const authorName = usernameMap[letter.user_id] || 'Unknown';

                    html += `
                        <div class="letter-card">
                            <div class="letter-card-header">
                                <h4>${letter.title}</h4>
                                <span>${dateText}</span>
                            </div>
                            <p class="letter-group">${groupName}</p>
                            <p class="letter-author">By ${authorName}</p>
                            <p class="letter-snippet">${letter.content}</p>
                        </div>
                    `;
                }

                lettersFeed.innerHTML = html;
            } catch (error) {
                console.error('Error loading letters:', error);
                lettersFeed.innerHTML = '<p class="empty-state">Error loading letters</p>';
            }
        }

        letterGroupFilter.addEventListener('change', (e) => {
            currentGroupId = e.target.value || '';
            loadLetters(currentGroupId || null);
        });

        setInterval(() => {
            loadLetters(currentGroupId || null);
        }, 15000);

        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) {
                loadLetters(currentGroupId || null);
            }
        });

        loadGroupOptions();
        loadLetters();
    </script>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>dorm floor productions</p>
        </div>
    </footer>
</body>
</html>
