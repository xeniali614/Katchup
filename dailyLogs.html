<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Write a Letter - Katchup</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="navbar-brand">
                <h1>Katchup</h1>
            </div>
            <div class="navbar-menu">
                <a href="/">
                    <!--ADD LOGO-->
                    <img src="images/splat.png" alt="Katchup Logo" class="logo">
                </a>
                <a href="dashboard.html" class="nav-link">Home</a>
                <a href="pictureGallery.html" class="nav-link btn-tertiary">Pictures</a>
                <a href="letterLog.html" class="nav-link btn-tertiary">Letter Logs</a>
                <a href="schedule.html" class="nav-link btn-tertiary">Schedule</a>
                <button class="hamburger-btn" id="hamburger">
                    <span class="bar"></span>
                    <span class="bar"></span>
                    <span class="bar"></span>
                </button>
                <!--hamburger menu links-->
                <ul class="hamburger-menu">
                    <!-- TO DO: CREATE PAGES AND LINK THEM-->
                    <li><a href="groups.html" class="nav-link">Manage Groups</a></li>
                    <li><a href="uploadPictures.html" class="nav-link">Upload Pictures</a></li>
                    <li><a href="dailyLogs.html" class="nav-link btn-tertiary">Write a Letter</a></li>
                    <li><a href="updateSchedule.html" class="nav-link btn-tertiary">Update Schedule</a></li>
                    <li><button id="logout-btn" class="nav-link btn-tertiary" style="width: 100%; text-align: left; border: none; background: none; cursor: pointer; padding: 0.75rem 1rem;">Logout</button></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Write a Letter Section -->
    <section class="upload-section">
        <div class="container">
            <div class="section-header">
                <h2>Write a Letter</h2>
                <p>Share your thoughts with your groups or keep a personal note.</p>
            </div>

            <div class="upload-form-container">
                <form id="letterForm" class="upload-form">
                    <div class="form-group">
                        <label for="letterGroup">Select Group</label>
                        <select id="letterGroup" required>
                            <option value="" disabled selected>Select a group...</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="letterTitle">Title</label>
                        <input
                            type="text"
                            id="letterTitle"
                            name="letterTitle"
                            placeholder="A short title for your letter"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="letterContent">Your Letter</label>
                        <textarea
                            id="letterContent"
                            name="letterContent"
                            placeholder="Write your letter here..."
                            rows="8"
                            required
                        ></textarea>
                    </div>

                    <button type="submit" class="btn-primary btn-submit">Save Letter</button>
                </form>

                <div id="letterMessage" class="message"></div>
            </div>

            <div class="letters-container">
                <h3>My Recent Letters</h3>
                <div id="lettersList" class="letters-grid">
                    <p class="empty-state">No letters yet. Write your first one!</p>
                </div>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
    <script>
        const { createClient } = window.supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY);

        const letterForm = document.getElementById('letterForm');
        const letterGroup = document.getElementById('letterGroup');
        const letterMessage = document.getElementById('letterMessage');
        const lettersList = document.getElementById('lettersList');

        async function loadLetters() {
            try {
                const { data: { user }, error: userError } = await supabaseClient.auth.getUser();
                if (userError || !user) {
                    lettersList.innerHTML = '<p class="empty-state">Please log in to view your letters</p>';
                    return;
                }

                const { data: letters, error } = await supabaseClient
                    .from('letters')
                    .select('id, title, content, created_at, group_id, groups(name)')
                    .eq('user_id', user.id)
                    .order('created_at', { ascending: false })
                    .limit(20);

                if (error || !letters || letters.length === 0) {
                    lettersList.innerHTML = '<p class="empty-state">No letters yet. Write your first one!</p>';
                    return;
                }

                let html = '';
                for (let letter of letters) {
                    const dateText = new Date(letter.created_at).toLocaleDateString('en-US', {
                        year: 'numeric',
                        month: 'short',
                        day: 'numeric'
                    });
                    const groupName = letter.groups?.name || '';

                    html += `
                        <div class="letter-card">
                            <div class="letter-card-header">
                                <h4>${letter.title}</h4>
                                <span>${dateText}</span>
                            </div>
                            ${groupName ? `<p class="letter-group">${groupName}</p>` : ''}
                            <p class="letter-snippet">${letter.content}</p>
                        </div>
                    `;
                }

                lettersList.innerHTML = html;
            } catch (error) {
                console.error('Error loading letters:', error);
                lettersList.innerHTML = '<p class="empty-state">Error loading letters</p>';
            }
        }

        async function loadGroups() {
            try {
                const { data: { user }, error: userError } = await supabaseClient.auth.getUser();
                if (userError || !user) {
                    return;
                }

                const { data: memberData } = await supabaseClient
                    .from('group_members')
                    .select('group_id, groups(id, name)')
                    .eq('user_id', user.id);

                if (memberData && memberData.length > 0) {
                    let options = '<option value="" disabled selected>Select a group...</option>';
                    for (let member of memberData) {
                        options += `<option value="${member.groups.id}">${member.groups.name}</option>`;
                    }
                    letterGroup.innerHTML = options;
                }
            } catch (error) {
                console.error('Error loading groups:', error);
            }
        }

        letterForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const title = document.getElementById('letterTitle').value.trim();
            const content = document.getElementById('letterContent').value.trim();
            const groupId = letterGroup.value;

            if (!title || !content || !groupId) {
                letterMessage.textContent = 'Please select a group, add a title, and write your letter.';
                letterMessage.className = 'message error';
                letterMessage.style.display = 'block';
                return;
            }
            try {
                const { data: { user }, error: userError } = await supabaseClient.auth.getUser();
                if (userError || !user) {
                    letterMessage.textContent = 'Please log in to save a letter.';
                    letterMessage.className = 'message error';
                    letterMessage.style.display = 'block';
                    return;
                }

                const { error } = await supabaseClient
                    .from('letters')
                    .insert([
                        {
                            user_id: user.id,
                            group_id: groupId,
                            title,
                            content
                        }
                    ]);

                if (error) {
                    letterMessage.textContent = 'Failed to save the letter.';
                    letterMessage.className = 'message error';
                    letterMessage.style.display = 'block';
                    return;
                }

                // Create notification for group members
                const { data: groupMembers } = await supabaseClient
                    .from('group_members')
                    .select('user_id')
                    .eq('group_id', groupId);

                if (groupMembers && groupMembers.length > 0) {
                    const notificationPromises = groupMembers
                        .filter(m => m.user_id !== user.id)
                        .map(m => supabaseClient
                            .from('notifications')
                            .insert([
                                {
                                    user_id: user.id,
                                    group_id: groupId,
                                    recipient_id: m.user_id,
                                    type: 'letter_written',
                                    letter_title: title,
                                    created_at: new Date().toISOString()
                                }
                            ])
                        );

                    const results = await Promise.all(notificationPromises);
                    console.log('Letter notification creation results:', results);
                    
                    // Check for errors in results
                    for (let i = 0; i < results.length; i++) {
                        if (results[i].error) {
                            console.error('Letter notification error:', results[i].error);
                        }
                    }
                }

                letterForm.reset();
                letterMessage.textContent = 'Letter saved.';
                letterMessage.className = 'message success';
                letterMessage.style.display = 'block';

                setTimeout(() => {
                    letterMessage.style.display = 'none';
                }, 2500);

                loadLetters();
            } catch (error) {
                console.error('Error saving letter:', error);
                letterMessage.textContent = 'An error occurred while saving.';
                letterMessage.className = 'message error';
                letterMessage.style.display = 'block';
            }
        });

        loadGroups();
        loadLetters();
    </script>
</body>
</html>
