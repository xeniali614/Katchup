<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Katchup</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
</head>
<body class="login-page">
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="navbar-brand">
                <span class="logo-link"><img src="images/splat final.png" alt="Katchup Logo" class="logo"></span>
                <h1><a href="index.html" class="title-link">Katchup</a></h1>
            </div>
            <div class="navbar-menu">
                <a href="index.html" class="nav-link index-nav-btn">Home</a>
                <a href="index.html#about" class="nav-link index-nav-btn">About</a>
                <a href="join.html" class="nav-link btn-secondary index-nav-btn login-signup-btn">Sign Up</a>
            </div>
        </div>
    </nav>

    <!-- Sign In Section -->
    <section class="auth-section">
        <div class="auth-container">
            <div class="auth-card">
                <h2>Welcome Back</h2>
                <p class="auth-subtitle">Sign in to your Katchup account</p>

                <form id="loginForm" class="auth-form">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            placeholder="you@example.com"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="Enter your password"
                            required
                        >
                    </div>

                    <button type="submit" class="btn-primary btn-submit">Sign In</button>
                </form>

                <div id="message" class="message"></div>

                <p class="auth-footer">
                    Don't have an account? <a href="join.html">Sign Up</a>
                </p>
                <p class="auth-footer">
                    <a href="#" id="forgotPasswordLink" class="forgot-password-link">Forgot Password?</a>
                </p>
            </div>
        </div>
    </section>

    <!-- Forgot Password Modal -->
    <div id="forgotPasswordModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Reset Password</h2>
                <button type="button" class="close" id="closeModal">&times;</button>
            </div>
            <div class="modal-body">
                <p>Enter your email address and we'll send you a link to reset your password.</p>
                <form id="forgotPasswordForm" class="auth-form">
                    <div class="form-group">
                        <label for="resetEmail">Email Address</label>
                        <input 
                            type="email" 
                            id="resetEmail" 
                            name="resetEmail" 
                            placeholder="you@example.com"
                            required
                        >
                    </div>
                    <button type="submit" class="btn-primary btn-submit">Send Reset Link</button>
                </form>
                <div id="resetMessage" class="message"></div>
            </div>
        </div>
    </div>

    <script>
        // Initialize Supabase
        const { createClient } = window.supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY);

        const loginForm = document.getElementById('loginForm');
        const messageEl = document.getElementById('message');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                // Show loading state
                const submitBtn = loginForm.querySelector('button[type="submit"]');
                submitBtn.disabled = true;
                submitBtn.textContent = 'Signing in...';

                // Sign in user with Supabase Auth
                const { data: authData, error: authError } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password,
                });

                if (authError) {
                    showMessage(authError.message, 'error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Sign In';
                    return;
                }

                const signedInUser = authData?.user;
                if (!signedInUser) {
                    showMessage('Unable to verify account. Please try again.', 'error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Sign In';
                    return;
                }

                const { data: profile, error: profileError } = await supabaseClient
                    .from('profiles')
                    .select('id, username')
                    .eq('id', signedInUser.id)
                    .maybeSingle();

                if (profileError) {
                    await supabaseClient.auth.signOut();
                    showMessage('Could not validate your profile. Please contact support.', 'error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Sign In';
                    return;
                }

                const hasValidProfile = profile && profile.id && profile.username && profile.username.trim().length > 0;
                if (!hasValidProfile) {
                    await supabaseClient.auth.signOut();
                    showMessage('This account no longer has website access. Please sign up again.', 'error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Sign In';
                    return;
                }

                showMessage('Sign in successful! Redirecting...', 'success');
                // Redirect to dashboard after 2 seconds
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 2000);

            } catch (error) {
                showMessage('An error occurred: ' + error.message, 'error');
                const submitBtn = loginForm.querySelector('button[type="submit"]');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Sign In';
            }
        });

        function showMessage(message, type) {
            messageEl.textContent = message;
            messageEl.className = 'message ' + type;
            messageEl.style.display = 'block';

            if (type === 'success') {
                setTimeout(() => {
                    messageEl.style.display = 'none';
                }, 2000);
            }
        }

        // Forgot Password Modal Functionality
        const forgotPasswordModal = document.getElementById('forgotPasswordModal');
        const forgotPasswordLink = document.getElementById('forgotPasswordLink');
        const closeModal = document.getElementById('closeModal');
        const forgotPasswordForm = document.getElementById('forgotPasswordForm');
        const resetMessage = document.getElementById('resetMessage');

        // Open modal
        forgotPasswordLink.addEventListener('click', (e) => {
            e.preventDefault();
            forgotPasswordModal.style.display = 'flex';
        });

        // Close modal
        closeModal.addEventListener('click', () => {
            forgotPasswordModal.style.display = 'none';
            resetMessage.style.display = 'none';
        });

        // Close modal when clicking outside of it
        window.addEventListener('click', (e) => {
            if (e.target === forgotPasswordModal) {
                forgotPasswordModal.style.display = 'none';
                resetMessage.style.display = 'none';
            }
        });

        // Handle password reset form submission
        forgotPasswordForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const resetEmail = document.getElementById('resetEmail').value;

            try {
                const submitBtn = forgotPasswordForm.querySelector('button[type="submit"]');
                submitBtn.disabled = true;
                submitBtn.textContent = 'Sending...';

                // Send password reset email
                const { data, error } = await supabaseClient.auth.resetPasswordForEmail(resetEmail, {
                    redirectTo: window.location.origin + '/reset-password.html',
                });

                if (error) {
                    resetMessage.textContent = error.message;
                    resetMessage.className = 'message error';
                } else {
                    resetMessage.textContent = 'Check your email for the password reset link!';
                    resetMessage.className = 'message success';
                    forgotPasswordForm.reset();
                    
                    setTimeout(() => {
                        forgotPasswordModal.style.display = 'none';
                        resetMessage.style.display = 'none';
                    }, 3000);
                }

                resetMessage.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Send Reset Link';

            } catch (error) {
                resetMessage.textContent = 'An error occurred: ' + error.message;
                resetMessage.className = 'message error';
                resetMessage.style.display = 'block';
                const submitBtn = forgotPasswordForm.querySelector('button[type="submit"]');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Send Reset Link';
            }
        });
    </script>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>dorm floor productions™</p>
            <img src="images/splat final animation.gif" alt="Splat" class="footer-logo">
        </div>
    </footer>
</body>
</html>
